<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Live</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --badge-bg: rgba(255, 255, 255, 0.6);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        body {
            margin: 0;
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, system-ui, sans-serif;
            /* 禁止系统橡皮筋回弹效果 */
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* 沉浸式布局容器 */
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 媒体包装器 */
        .media-box {
            position: relative;
            display: inline-block;
            line-height: 0;
            /* 防止快速点击导致的系统缩放 */
            touch-action: none; 
        }

        .media-content {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        #videoLayer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: 2;
            /* 丝滑过渡 */
            transition: opacity 0.2s cubic-bezier(0.44, 0.33, 0, 1);
        }

        /* 适配全面屏的 Live 标志位置 */
        .live-badge {
            position: absolute;
            /* 使用 safe-area 以免标志被灵动岛或状态栏挡住 */
            top: calc(var(--safe-top) + 10px);
            left: 15px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--badge-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 100px;
            pointer-events: none;
            transition: all 0.3s ease;
            opacity: 0.9;
        }

        .circle-outer {
            stroke: #000;
            stroke-width: 1.5;
            stroke-dasharray: 2 4;
            transform-origin: center;
        }
        .circle-inner { fill: #000; }

        /* 激活态动效 */
        .is-active .live-badge {
            background: rgba(255, 255, 255, 0.95);
            transform: scale(1.05);
        }
        .is-active .circle-outer {
            animation: live-rotate 1.5s linear infinite;
        }

        @keyframes live-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .live-text {
            color: #000;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* 全屏交互面：避开边缘防止手势冲突 */
        #touchSurface {
            position: absolute;
            top: 50px;
            bottom: 50px;
            left: 30px;
            right: 30px;
            z-index: 40;
            /* 彻底禁用 iOS 长按弹出菜单 */
            -webkit-touch-callout: none;
        }

        /* 启动视图 */
        .init-view {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .upload-btn {
            background: #fff;
            color: #000;
            padding: 16px 40px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 200;
            letter-spacing: 6px;
            color: #fff;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="initView" class="init-view">
    <div class="logo-text">AURA LIVE</div>
    <label class="upload-btn">
        选取实况照片
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </label>
</div>

<div class="app-container">
    <div id="mediaBox" class="media-box" style="display:none">
        <div class="live-badge">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <circle class="circle-outer" cx="12" cy="12" r="9" fill="none"></circle>
                <circle class="circle-inner" cx="12" cy="12" r="2.5"></circle>
            </svg>
            <span class="live-text">Live</span>
        </div>
        
        <img id="photoLayer" class="media-content">
        <video id="videoLayer" class="media-content" playsinline preload="auto"></video>
        
        <div id="touchSurface"></div>
    </div>
</div>

<script>
    // 注册 SW
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const $ = id => document.getElementById(id);
    let timer = null;
    let isHolding = false;

    $('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const buffer = await file.arrayBuffer();
        const view = new Uint8Array(buffer);
        let videoBlob = null;

        // 高速扫描视频流
        for (let i = view.length - 4; i >= 4; i--) {
            if (view[i]===0x66 && view[i+1]===0x74 && view[i+2]===0x79 && view[i+3]===0x70) {
                videoBlob = new Blob([buffer.slice(i - 4)], { type: 'video/mp4' });
                break;
            }
        }

        if (videoBlob) {
            $('photoLayer').src = URL.createObjectURL(file);
            $('videoLayer').src = URL.createObjectURL(videoBlob);
            $('initView').style.display = 'none';
            $('mediaBox').style.display = 'block';
            setupInteraction();
        } else {
            alert("此照片不包含 Live 视频数据");
        }
    };

    function setupInteraction() {
        const video = $('videoLayer');
        const box = $('mediaBox');

        const play = () => {
            box.classList.add('is-active');
            video.style.opacity = '1';
            video.muted = false;
            video.currentTime = 0;
            video.play();
            // 触觉反馈 (仅 Android/部分移动端支持)
            if (navigator.vibrate) navigator.vibrate(10);
        };

        const stop = () => {
            box.classList.remove('is-active');
            video.style.opacity = '0';
            setTimeout(() => { if(!isHolding) video.pause(); }, 200);
        };

        // 移动端专用 Pointer 事件
        $('touchSurface').addEventListener('pointerdown', (e) => {
            isHolding = true;
            timer = setTimeout(play, 150); // 略微缩短响应时间，增加灵敏度
        });

        const handleRelease = () => {
            isHolding = false;
            clearTimeout(timer);
        };

        $('touchSurface').addEventListener('pointerup', handleRelease);
        $('touchSurface').addEventListener('pointerleave', handleRelease);
        $('touchSurface').addEventListener('pointercancel', handleRelease);

        video.onended = () => {
            if (isHolding) {
                video.currentTime = 0;
                video.play();
            } else {
                stop();
            }
        };

        // 强制禁用右键和弹出菜单
        window.oncontextmenu = (e) => {
            e.preventDefault();
            return false;
        };
    }
</script>
</body>
</html>
