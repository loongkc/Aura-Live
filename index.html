<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Live</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aura Live">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root {
            --badge-bg: rgba(255, 255, 255, 0.5);
            --text-color: #1a1a1a;
        }
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .stage {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .media-box {
            position: relative;
            display: inline-block;
            line-height: 0;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        .media-content {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            pointer-events: none;
        }

        #videoLayer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: 2;
            transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #photoLayer { z-index: 1; }

        /* 精致白底半透明标志 */
        .live-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: var(--badge-bg);
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border-radius: 40px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .live-icon { width: 16px; height: 16px; }
        .circle-outer {
            stroke: var(--text-color);
            stroke-width: 1.2;
            stroke-dasharray: 2 4;
            transform-origin: center;
        }
        .circle-inner { fill: var(--text-color); }

        /* 播放动画状态 */
        .is-playing .live-badge { background: rgba(255, 255, 255, 0.8); transform: scale(1.05); }
        .is-playing .circle-outer { animation: rotate-live 1.2s linear infinite; stroke-dasharray: 4 2; }

        @keyframes rotate-live { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .live-text {
            color: var(--text-color);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        #touchSurface {
            position: absolute;
            inset: 0;
            z-index: 20;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #initOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .upload-trigger {
            padding: 16px 40px;
            background: #fff;
            color: #000;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }
        .app-name { color: #fff; font-size: 24px; font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="initOverlay">
    <div class="app-name">AURA LIVE</div>
    <label class="upload-trigger">
        选择照片
        <input type="file" id="fileIn" accept="image/*" style="display:none">
    </label>
</div>

<div class="stage">
    <div class="media-box" id="mediaBox" style="display:none">
        <div class="live-badge" id="liveBadge">
            <svg class="live-icon" viewBox="0 0 24 24">
                <circle class="circle-outer" cx="12" cy="12" r="9" fill="none"></circle>
                <circle class="circle-inner" cx="12" cy="12" r="2.5"></circle>
            </svg>
            <span class="live-text">Live</span>
        </div>
        <img id="photoLayer" class="media-content">
        <video id="videoLayer" class="media-content" playsinline></video>
        <div id="touchSurface"></div>
    </div>
</div>

<script>
    // PWA Service Worker 注册
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }

    const $ = id => document.getElementById(id);
    let isPressing = false;
    let longPressTimer = null;

    $('fileIn').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const buffer = await file.arrayBuffer();
        const view = new Uint8Array(buffer);
        let videoBlob = null;

        for (let i = view.length - 4; i >= 4; i--) {
            if (view[i]===0x66 && view[i+1]===0x74 && view[i+2]===0x79 && view[i+3]===0x70) {
                videoBlob = new Blob([buffer.slice(i - 4)], { type: 'video/mp4' });
                break;
            }
        }

        if (videoBlob) {
            $('photoLayer').src = URL.createObjectURL(file);
            $('videoLayer').src = URL.createObjectURL(videoBlob);
            $('initOverlay').style.display = 'none';
            $('mediaBox').style.display = 'block';
            bindEvents();
        } else {
            alert("非有效实况照片格式");
        }
    };

    function bindEvents() {
        const video = $('videoLayer');
        const box = $('mediaBox');

        const playLive = () => {
            box.classList.add('is-playing');
            video.style.opacity = '1';
            video.muted = false;
            video.currentTime = 0;
            video.play();
        };

        const stopLive = () => {
            box.classList.remove('is-playing');
            video.style.opacity = '0';
            setTimeout(() => { if(!isPressing) video.pause(); }, 250);
        };

        $('touchSurface').onpointerdown = (e) => {
            isPressing = true;
            longPressTimer = setTimeout(playLive, 200);
        };

        const end = () => {
            isPressing = false;
            clearTimeout(longPressTimer);
        };

        $('touchSurface').onpointerup = end;
        $('touchSurface').onpointerleave = end;
        $('touchSurface').oncontextmenu = e => e.preventDefault();

        video.onended = () => {
            if (isPressing) {
                video.currentTime = 0;
                video.play();
            } else {
                stopLive();
            }
        };
    }
</script>
</body>
</html>
