<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Live</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aura Live">

    <style>
        :root {
            --badge-bg: rgba(255, 255, 255, 0.55);
            --text-color: #1a1a1a;
            /* 适配 iOS 安全区变量 */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            -webkit-touch-callout: none; /* 禁用系统长按菜单 */
            -webkit-tap-highlight-color: transparent; /* 禁用点击高亮 */
        }

        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* 防止 iOS 橡皮筋回弹 */
            position: fixed;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-box {
            position: relative;
            display: inline-block;
            line-height: 0;
            /* 硬件加速渲染 */
            transform: translateZ(0);
        }

        .media-content {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            pointer-events: none;
        }

        #videoLayer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: 2;
            transition: opacity 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        #photoLayer { z-index: 1; }

        /* --- 移动端优化标志 --- */
        .live-badge {
            position: absolute;
            /* 考虑安全区距离 */
            top: calc(15px + var(--safe-top));
            left: 15px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--badge-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 100px;
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .live-icon { width: 14px; height: 14px; }
        .circle-outer {
            stroke: var(--text-color);
            stroke-width: 1.5;
            stroke-dasharray: 2 4;
            transform-origin: center;
        }
        .circle-inner { fill: var(--text-color); }

        .is-playing .live-badge { 
            background: rgba(255, 255, 255, 0.85); 
            transform: scale(1.05); 
        }
        .is-playing .circle-outer { 
            animation: rotate-live 1s linear infinite; 
            stroke-dasharray: 4 2; 
        }

        @keyframes rotate-live { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .live-text {
            color: var(--text-color);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* 专门的交互层，遮住整个照片 */
        #touchSurface {
            position: absolute;
            inset: 0;
            z-index: 20;
            touch-action: none; /* 禁用所有原生手势 */
        }

        /* 引导页适配 */
        #initOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: var(--safe-bottom);
        }
        
        .app-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        .upload-trigger {
            padding: 18px 45px;
            background: #fff;
            color: #000;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 4px 20px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div id="initOverlay">
    <img src="icon-512.png" class="app-logo" alt="Logo">
    <label class="upload-trigger">
        选择照片
        <input type="file" id="fileIn" accept="image/*" style="display:none">
    </label>
</div>

<div class="stage">
    <div class="media-box" id="mediaBox" style="display:none">
        <div class="live-badge" id="liveBadge">
            <svg class="live-icon" viewBox="0 0 24 24">
                <circle class="circle-outer" cx="12" cy="12" r="9" fill="none"></circle>
                <circle class="circle-inner" cx="12" cy="12" r="2.5"></circle>
            </svg>
            <span class="live-text">Live</span>
        </div>
        <img id="photoLayer" class="media-content">
        <video id="videoLayer" class="media-content" playsinline preload="auto"></video>
        <div id="touchSurface"></div>
    </div>
</div>

<script>
    // PWA Service Worker 注册
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }

    const $ = id => document.getElementById(id);
    let isPressing = false;
    let longPressTimer = null;

    $('fileIn').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const buffer = await file.arrayBuffer();
        const view = new Uint8Array(buffer);
        let videoBlob = null;

        for (let i = view.length - 4; i >= 4; i--) {
            if (view[i]===0x66 && view[i+1]===0x74 && view[i+2]===0x79 && view[i+3]===0x70) {
                videoBlob = new Blob([buffer.slice(i - 4)], { type: 'video/mp4' });
                break;
            }
        }

        if (videoBlob) {
            $('photoLayer').src = URL.createObjectURL(file);
            $('videoLayer').src = URL.createObjectURL(videoBlob);
            $('initOverlay').style.display = 'none';
            $('mediaBox').style.display = 'block';
            bindEvents();
        } else {
            alert("此照片非原生实况格式或已被社交软件修改");
        }
    };

    function bindEvents() {
        const video = $('videoLayer');
        const box = $('mediaBox');

        const playLive = () => {
            box.classList.add('is-playing');
            video.style.opacity = '1';
            video.muted = false;
            video.currentTime = 0;
            // 移动端优化：确保声音加载完成
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    video.muted = true;
                    video.play();
                });
            }
        };

        const stopLive = () => {
            box.classList.remove('is-playing');
            video.style.opacity = '0';
            // 略微延迟暂停，让淡出动画完成
            setTimeout(() => { if(!isPressing) video.pause(); }, 200);
        };

        // 使用 pointer 事件统一处理触摸
        $('touchSurface').onpointerdown = (e) => {
            isPressing = true;
            longPressTimer = setTimeout(playLive, 250);
        };

        const end = (e) => {
            isPressing = false;
            clearTimeout(longPressTimer);
        };

        $('touchSurface').onpointerup = end;
        $('touchSurface').onpointercancel = end;
        $('touchSurface').onpointerleave = end;

        // 核心循环与单次播放逻辑
        video.onended = () => {
            if (isPressing) {
                video.currentTime = 0;
                video.play();
            } else {
                stopLive();
            }
        };
    }
</script>
</body>
</html>
