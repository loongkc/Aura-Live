<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura Live</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aura Live">

    <style>
        :root {
            --badge-bg: rgba(255, 255, 255, 0.5);
            --text-color: #1a1a1a;
            --safe-top: env(safe-area-inset-top);
        }

        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
            position: fixed; /* 防止橡皮筋回弹 */
        }

        /* 外部容器 */
        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 媒体包装器 */
        .media-box {
            position: relative;
            display: inline-block;
            line-height: 0;
            transform: translateZ(0); /* 开启 GPU 加速 */
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .media-content {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
            pointer-events: none;
        }

        #videoLayer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: 2;
            transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #photoLayer { z-index: 1; }

        /* --- 极致透明 Live 标志 --- */
        .live-badge {
            position: absolute;
            top: calc(15px + var(--safe-top));
            left: 15px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--badge-bg);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border-radius: 100px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .live-icon { width: 14px; height: 14px; }
        .circle-outer {
            stroke: var(--text-color);
            stroke-width: 1.5;
            stroke-dasharray: 2 4;
            transform-origin: center;
        }
        .circle-inner { fill: var(--text-color); }

        .is-playing .live-badge { 
            background: rgba(255, 255, 255, 0.8); 
            transform: scale(1.05); 
        }
        .is-playing .circle-outer { 
            animation: rotate-live 1.2s linear infinite; 
            stroke-dasharray: 4 2; 
        }

        @keyframes rotate-live { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .live-text {
            color: var(--text-color);
            font-size: 11.5px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* 透明交互层 */
        #touchSurface {
            position: absolute;
            inset: 0;
            z-index: 20;
            touch-action: none;
        }

        /* 初始引导页 */
        #initOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        .app-name {
            color: #fff;
            font-size: 26px;
            font-weight: 200;
            letter-spacing: 6px;
        }
        .upload-trigger {
            padding: 16px 45px;
            background: #fff;
            color: #000;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="initOverlay">
    <div class="app-name">AURA LIVE</div>
    <label class="upload-trigger">
        打开照片
        <input type="file" id="fileIn" accept="image/*" style="display:none">
    </label>
</div>

<div class="stage">
    <div class="media-box" id="mediaBox" style="display:none">
        <div class="live-badge" id="liveBadge">
            <svg class="live-icon" viewBox="0 0 24 24">
                <circle class="circle-outer" cx="12" cy="12" r="9" fill="none"></circle>
                <circle class="circle-inner" cx="12" cy="12" r="2.5"></circle>
            </svg>
            <span class="live-text">Live</span>
        </div>
        <img id="photoLayer" class="media-content">
        <video id="videoLayer" class="media-content" playsinline preload="auto"></video>
        <div id="touchSurface"></div>
    </div>
</div>

<script>
    // 注册 PWA Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }

    const $ = id => document.getElementById(id);
    let isPressing = false;
    let longPressTimer = null;

    $('fileIn').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const buffer = await file.arrayBuffer();
        const view = new Uint8Array(buffer);
        let videoBlobs = [];

        // 核心：深度扫描全文件。OPPO 等厂商在文件末尾才存放真正的高清有声视频
        for (let i = 0; i < view.length - 4; i++) {
            // 搜索 MP4 标识 'ftyp'
            if (view[i]===0x66 && view[i+1]===0x74 && view[i+2]===0x79 && view[i+3]===0x70) {
                // 向前偏移 4 字节是 MP4 容器起始点
                videoBlobs.push(new Blob([buffer.slice(i - 4)], { type: 'video/mp4' }));
            }
        }

        if (videoBlobs.length > 0) {
            // 取最后一段视频流（兼容 OPPO/一加 的主视频流策略）
            const finalVideo = videoBlobs[videoBlobs.length - 1];
            
            $('photoLayer').src = URL.createObjectURL(file);
            $('videoLayer').src = URL.createObjectURL(finalVideo);
            $('initOverlay').style.display = 'none';
            $('mediaBox').style.display = 'inline-block';
            bindUI();
        } else {
            alert("未识别到实况照片。请确认是原图上传。");
        }
    };

    function bindUI() {
        const video = $('videoLayer');
        const box = $('mediaBox');

        const start = () => {
            box.classList.add('is-playing');
            video.style.opacity = '1';
            video.muted = false; // 默认开启声音
            video.currentTime = 0;
            video.play().catch(() => {
                // 如果被浏览器策略阻断声音，则退回到静音播放
                video.muted = true;
                video.play();
            });
        };

        const stop = () => {
            box.classList.remove('is-playing');
            video.style.opacity = '0';
            setTimeout(() => { if(!isPressing) video.pause(); }, 250);
        };

        $('touchSurface').onpointerdown = (e) => {
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            isPressing = true;
            longPressTimer = setTimeout(start, 200);
        };

        const end = () => {
            isPressing = false;
            clearTimeout(longPressTimer);
        };

        $('touchSurface').onpointerup = end;
        $('touchSurface').onpointerleave = end;
        $('touchSurface').oncontextmenu = e => e.preventDefault();

        video.onended = () => {
            if (isPressing) {
                video.currentTime = 0;
                video.play();
            } else {
                stop();
            }
        };
    }
</script>
</body>
</html>
